version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  mysql:
    image: mysql:8.4
    container_name: iot-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    container_name: iot-adminer
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8080:8080"

  bridge:
    build:
      context: ./bridge
    container_name: iot-bridge
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started
    env_file:
      - .env
    environment:
      MQTT_BROKER: tcp://mosquitto:1883
      MQTT_TOPIC: devices/+/telemetry
      MYSQL_DSN: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true&multiStatements=true

  gts-worker:
    build:
      context: ./gts-worker
    container_name: iot-gts-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MYSQL_DSN: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true&multiStatements=true
      GTS_INTERVAL: 5m
      TZ: Europe/Berlin

  trend-worker:
    build:
      context: ./trend-worker
    container_name: iot-trend-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MYSQL_DSN: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true&multiStatements=true
      TREND_INTERVAL: 5m
      TREND_LOOKBACK_HOURS: 48
      TZ: Europe/Berlin

  grafana:
    image: grafana/grafana:11.1.4
    container_name: iot-grafana
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  mysql-data: